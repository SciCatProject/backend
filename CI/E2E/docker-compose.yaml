version: "3.4"
services:
  reverse-proxy:
    image: traefik:2.5
    command: --api.insecure=true --providers.docker=true --entrypoints.web.address=:80
    ports:
      - 8080:80
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
  mongodb:
    image: mongo:latest
    command: ["--replSet", "rs0", "--bind_ip_all"]
    environment:
      MONGO_RS_HOST: "localhost:27017"
    volumes:
      - "mongodb_data:/data/db"
    ports:
      - "27017:27017"
    healthcheck:
      test: >
        mongosh --quiet --eval "
          try { rs.status().ok }
          catch { rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: '$$MONGO_RS_HOST' }] }) }
        "
      interval: 10s
      start_period: 40s
      retries: 5
  scichat-loopback:
    image: dacat/scichat-loopback:e2e
    command:
      [
        "./wait-for-it.sh",
        "mongodb:27017",
        "--",
        "node",
        "-r",
        "dotenv/config",
        "."
      ]
    volumes:
      - "./CI/E2E/.env.scichat-loopback:/home/node/app/.env"
    depends_on:
      mongodb:
        condition: service_healthy
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - "./CI/E2E/backend.env:/home/node/app/.env"
    #  - "./CI/E2E/frontend.config.json:/home/node/app/dist/config/frontend.config.json"
    depends_on:
      mongodb:
        condition: service_healthy
      es01:
        condition: service_healthy
    labels:
      - "traefik.http.routers.backend.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.backend.entrypoints=web"
  frontend:
    image: ghcr.io/scicatproject/frontend:latest
    #volumes:
    #  - "./CI/E2E/config-frontend.backend-e2e.json:/usr/share/nginx/html/assets/config.json"
    depends_on:
      - backend
    labels:
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.entrypoints=web"

  opensearch:
    depends_on:
      - mongodb
    image: opensearchproject/opensearch:3.5.0
    ports:
      - 9200:9200
    environment:
      - node.name=opensearch
      - discovery.type=single-node
      - cluster.name=os-cluster
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=-Xms2g -Xmx2g
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=Scicat_default_password_2026
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    mem_limit: 4G
    ulimits:
      memlock:
        soft: -1
        hard: -1
volumes:
  mongodb_data:
    driver: local
  opensearch_data:
    driver: local
