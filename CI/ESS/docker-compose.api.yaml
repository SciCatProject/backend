services:
  mongodb:
    image: mongo:latest
    volumes:
      - mongodb_data:/bitnami
    ports:
      - "27017:27017"
  opensearch:
    profiles:
      - opensearch
    depends_on:
      - mongodb
    image: opensearchproject/opensearch:3.5.0
    ports:
      - "9200:9200"
    environment:
      - node.name=opensearch
      - discovery.type=single-node
      - cluster.name=os-test-cluster
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=-Xms2g -Xmx2g
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=apiTestPassword
    mem_limit: 4G
    ulimits:
      memlock:
        soft: -1
        hard: -1
volumes:
  mongodb_data:
    driver: local

