services:
  mock-oauth:
    image: ghcr.io/navikt/mock-oauth2-server:latest
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      JSON_CONFIG: |
        {
          "interactiveLogin": false,
          "httpServer": "NettyWrapper",
          "tokenCallbacks": [
            {
              "issuerId": "local-test",
              "tokenExpiry": 3600,
              "requestMappings": [
                {
                  "requestParam": "client_id",
                  "match": "scicat-client-test",
                  "claims": {
                    "sub": "test-username",
                    "preferred_username": "test-username",
                    "email": "test@test.com",
                    "aud": "scicat-client-test",
                    "azp": "scicat-client-test"
                  }
                },
                {
                  "requestParam": "client_id",
                  "match": "additional-authorized-client-test-1",
                  "claims": {
                    "sub": "test-username",
                    "preferred_username": "test-username",
                    "email": "test@test.com",
                    "aud": "scicat-client-test",
                    "azp": "additional-authorized-client-test-1"
                  }
                },
                {
                  "requestParam": "client_id",
                  "match": "additional-authorized-client-test-2",
                  "claims": {
                    "sub": "test-username",
                    "preferred_username": "test-username",
                    "email": "test@test.com",
                    "aud": "scicat-client-test",
                    "azp": "additional-authorized-client-test-2"
                  }
                },
                {
                  "requestParam": "client_id",
                  "match": "untrusted-client-test",
                  "claims": {
                    "sub": "test-username",
                    "preferred_username": "test-username",
                    "email": "test@test.com",
                    "aud": "untrusted-client-test",
                    "azp": "untrusted-client-test"
                  }
                }
              ]
            }
          ]
        }
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8080/local-test/.well-known/openid-configuration || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s  
      
  mongodb:
    image: mongo:latest
    volumes:
      - mongodb_data:/bitnami
    ports:
      - "27017:27017"
  es01:
    profiles:
      - elasticsearch
    depends_on:
      - mongodb
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    ports:
      - "9200:9200"
    environment:
      - node.name=es01
      - ES_JAVA_OPTS=-Xms2g -Xmx2g
      - cluster.name=${CLUSTER_NAME}
      - cluster.initial_master_nodes=es01
      - ELASTIC_PASSWORD=${ES_PASSWORD}
      - bootstrap.memory_lock=true
    mem_limit: ${MEM_LIMIT}
    ulimits:
      memlock:
        soft: -1
        hard: -1
volumes:
  mongodb_data:
    driver: local
  es01:
    driver: local
